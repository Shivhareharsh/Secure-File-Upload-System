apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: secure-file-upload-system-frontend:v12
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5173